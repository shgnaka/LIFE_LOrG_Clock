name: Verify Desktop Linux

on:
  pull_request:
    paths:
      - ".github/workflows/verify-desktop-linux.yml"
      - "desktopApp/**"
      - "shared/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/verify-desktop-linux.yml"
      - "desktopApp/**"
      - "shared/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  desktop-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Verify desktop compile
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          mkdir -p artifacts/desktop-linux
          ./gradlew --stacktrace verifyDesktopCurrentOs 2>&1 | tee artifacts/desktop-linux/verify-desktop-current-os.log

      - name: Verify Linux packaging
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew --stacktrace packageDesktopCurrentOs 2>&1 | tee artifacts/desktop-linux/package-desktop-current-os.log

      - name: Upload desktop artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux-binaries
          path: |
            desktopApp/build/compose/binaries/main
            artifacts/desktop-linux
