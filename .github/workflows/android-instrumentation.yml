name: Android Instrumentation Tests

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  android-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GRADLE_USER_HOME: /home/runner/.gradle
      ANDROID_TEST_LOG_KEEP_RUNS: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Prepare run-id and artifact directory
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::8}"
          SHA_EPOCH="$(git show -s --format=%ct "$GITHUB_SHA")"
          UTC_TS="$(date -u -d "@${SHA_EPOCH}" +%Y%m%dT%H%M%SZ)"
          RUN_ID="${UTC_TS}_r${GITHUB_RUN_NUMBER}_a${GITHUB_RUN_ATTEMPT}_sha${SHORT_SHA}"
          ARTIFACT_BASE_DIR="artifacts/ci/android-test/${RUN_ID}/api34"
          echo "RUN_ID=${RUN_ID}" >> "$GITHUB_ENV"
          echo "ARTIFACT_BASE_DIR=${ARTIFACT_BASE_DIR}" >> "$GITHUB_ENV"
          mkdir -p "${ARTIFACT_BASE_DIR}"

      - name: Cleanup old android-test run logs
        run: |
          set -euo pipefail
          bash .github/scripts/cleanup-ci-logs.sh artifacts/ci/android-test "${ANDROID_TEST_LOG_KEEP_RUNS}"

      - name: Run instrumentation tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        env:
          ARTIFACT_BASE_DIR: ${{ env.ARTIFACT_BASE_DIR }}
          ANDROID_TEST_FLAVOR: api34
        with:
          api-level: 34
          arch: x86_64
          profile: Nexus 6
          disable-animations: true
          emulator-boot-timeout: 1200
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -no-metrics -cores 2 -memory 2048
          script: bash .github/scripts/android-instrumentation.sh

      - name: Upload androidTest reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-instrumentation-report-api34
          path: |
            app/build/reports/androidTests
            app/build/outputs/androidTest-results
            app/build/outputs/logs
            ${{ env.ARTIFACT_BASE_DIR }}
            /tmp/android-runner
            /home/runner/.android/avd/*/emulator-user.log

  android-test-api35:
    name: Android Instrumentation Tests (API 35)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GRADLE_USER_HOME: /home/runner/.gradle
      ANDROID_TEST_LOG_KEEP_RUNS: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Prepare run-id and artifact directory
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::8}"
          SHA_EPOCH="$(git show -s --format=%ct "$GITHUB_SHA")"
          UTC_TS="$(date -u -d "@${SHA_EPOCH}" +%Y%m%dT%H%M%SZ)"
          RUN_ID="${UTC_TS}_r${GITHUB_RUN_NUMBER}_a${GITHUB_RUN_ATTEMPT}_sha${SHORT_SHA}"
          ARTIFACT_BASE_DIR="artifacts/ci/android-test/${RUN_ID}/api35"
          echo "RUN_ID=${RUN_ID}" >> "$GITHUB_ENV"
          echo "ARTIFACT_BASE_DIR=${ARTIFACT_BASE_DIR}" >> "$GITHUB_ENV"
          mkdir -p "${ARTIFACT_BASE_DIR}"

      - name: Cleanup old android-test run logs
        run: |
          set -euo pipefail
          bash .github/scripts/cleanup-ci-logs.sh artifacts/ci/android-test "${ANDROID_TEST_LOG_KEEP_RUNS}"

      - name: Run instrumentation tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        env:
          ARTIFACT_BASE_DIR: ${{ env.ARTIFACT_BASE_DIR }}
          ANDROID_TEST_FLAVOR: api35
        with:
          api-level: 35
          arch: x86_64
          profile: Nexus 6
          disable-animations: true
          emulator-boot-timeout: 1200
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -no-metrics -cores 2 -memory 2048
          script: bash .github/scripts/android-instrumentation.sh

      - name: Upload androidTest reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-instrumentation-report-api35
          path: |
            app/build/reports/androidTests
            app/build/outputs/androidTest-results
            app/build/outputs/logs
            ${{ env.ARTIFACT_BASE_DIR }}
            /tmp/android-runner
            /home/runner/.android/avd/*/emulator-user.log
