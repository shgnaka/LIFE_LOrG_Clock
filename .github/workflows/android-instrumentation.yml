name: Android Instrumentation Tests

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  android-test:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    env:
      GRADLE_USER_HOME: /home/runner/.gradle

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Run instrumentation tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: Nexus 6
          disk-size: 8192M
          heap-size: 512M
          disable-animations: true
          emulator-boot-timeout: 1200
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -no-metrics -cores 2 -memory 2048 -partition-size 2048
          script: bash .github/scripts/android-instrumentation.sh

      - name: Upload androidTest reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-instrumentation-report-api33
          path: |
            app/build/reports/androidTests
            app/build/outputs/androidTest-results
            app/build/outputs/logs
            artifacts/android-test
            /tmp/android-runner
            /home/runner/.android/avd/*/emulator-user.log

  android-test-api34:
    name: Android Instrumentation Tests (API 34)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GRADLE_USER_HOME: /home/runner/.gradle

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Run instrumentation tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: Nexus 6
          disable-animations: true
          emulator-boot-timeout: 1200
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -no-metrics -cores 3 -memory 3072
          script: bash .github/scripts/android-instrumentation.sh

      - name: Upload androidTest reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-instrumentation-report-api34
          path: |
            app/build/reports/androidTests
            app/build/outputs/androidTest-results
            app/build/outputs/logs
            artifacts/android-test
            /tmp/android-runner
            /home/runner/.android/avd/*/emulator-user.log

  android-test-api35:
    name: Android Instrumentation Tests (API 35)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GRADLE_USER_HOME: /home/runner/.gradle

    steps:
