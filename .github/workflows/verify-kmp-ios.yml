name: Verify KMP iOS Targets

on:
  pull_request:
    paths:
      - ".github/workflows/verify-kmp-ios.yml"
      - ".github/workflows/verify-ios-host-skeleton.yml"
      - "iosApp/**"
      - "shared/build.gradle.kts"
      - "shared/src/iosMain/**"
      - "shared/src/iosTest/**"
      - "shared/src/commonMain/kotlin/com/example/orgclock/shared/**"
      - "shared/src/commonTest/kotlin/com/example/orgclock/shared/**"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/verify-kmp-ios.yml"
      - ".github/workflows/verify-ios-host-skeleton.yml"
      - "iosApp/**"
      - "shared/build.gradle.kts"
      - "shared/src/iosMain/**"
      - "shared/src/iosTest/**"
      - "shared/src/commonMain/kotlin/com/example/orgclock/shared/**"
      - "shared/src/commonTest/kotlin/com/example/orgclock/shared/**"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  compile-ios-targets:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Compile iosArm64
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew --stacktrace :shared:compileKotlinIosArm64

      - name: Compile iosSimulatorArm64
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew --stacktrace :shared:compileKotlinIosSimulatorArm64

      - name: Run iosSimulatorArm64 tests
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew --stacktrace :shared:iosSimulatorArm64Test
