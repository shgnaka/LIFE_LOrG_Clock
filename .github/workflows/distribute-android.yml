name: Distribute Android (Firebase)

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git ref to build (branch/tag/SHA)"
        required: false
        default: "main"
      tester_group:
        description: "Firebase tester group alias"
        required: false
        default: "internal-testers"
      release_notes:
        description: "Release notes shown to testers"
        required: false
        default: ""

permissions:
  contents: read
  id-token: write

jobs:
  distribute:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}

      - name: Print workflow fingerprint
        run: |
          set -euo pipefail
          echo "WORKFLOW_IMPL=rest-v1"
          echo "GITHUB_SHA=${GITHUB_SHA}"
          echo "WORKFLOW_REF=${{ github.workflow_ref }}"
          echo "INPUT_GIT_REF=${{ inputs.git_ref }}"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Validate required secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          FIREBASE_APP_ID_ANDROID: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
        run: |
          set -euo pipefail
          required=(
            ANDROID_KEYSTORE_BASE64
            ANDROID_KEYSTORE_PASSWORD
            ANDROID_KEY_ALIAS
            ANDROID_KEY_PASSWORD
            GCP_WORKLOAD_IDENTITY_PROVIDER
            GCP_SERVICE_ACCOUNT_EMAIL
            FIREBASE_APP_ID_ANDROID
          )
          missing=0
          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing required secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Authenticate to Google Cloud (OIDC)
        id: gcp-auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/cloud-platform

      - name: Restore Android keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          if [ ! -s "$RUNNER_TEMP/release.keystore" ]; then
            echo "::error::Keystore restore failed or file is empty"
            exit 1
          fi

      - name: Build release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew --stacktrace assembleRelease

      - name: Locate release APK
        id: apk
        run: |
          set -euo pipefail
          APK_PATH=$(find app/build/outputs/apk/release -maxdepth 1 -type f -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "::error::No release APK found in app/build/outputs/apk/release"
            exit 1
          fi
          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "Found APK: $APK_PATH"

      - name: Upload APK to App Distribution (REST)
        id: upload
        env:
          FIREBASE_APP_ID_ANDROID: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
          APK_PATH: ${{ steps.apk.outputs.path }}
          GCP_ACCESS_TOKEN: ${{ steps.gcp-auth.outputs.access_token }}
        run: |
          set -euo pipefail
          PROJECT_NUMBER=$(echo "$FIREBASE_APP_ID_ANDROID" | cut -d: -f2)
          if [ -z "$PROJECT_NUMBER" ]; then
            echo "::error::Unable to parse project number from FIREBASE_APP_ID_ANDROID"
            exit 1
          fi
          APP_RESOURCE="projects/${PROJECT_NUMBER}/apps/${FIREBASE_APP_ID_ANDROID}"

          UPLOAD_RESPONSE=$(curl -sS -X POST \
            -H "Authorization: Bearer $GCP_ACCESS_TOKEN" \
            -H "X-Goog-Upload-Protocol: raw" \
            -H "X-Goog-Upload-File-Name: $(basename "$APK_PATH")" \
            -H "Content-Type: application/octet-stream" \
            --data-binary "@$APK_PATH" \
            "https://firebaseappdistribution.googleapis.com/upload/v1/${APP_RESOURCE}/releases:upload")

          OPERATION_NAME=$(echo "$UPLOAD_RESPONSE" | jq -r '.name // empty')
          if [ -z "$OPERATION_NAME" ]; then
            echo "::error::Upload response did not include operation name"
            echo "$UPLOAD_RESPONSE"
            exit 1
          fi

          echo "operation=$OPERATION_NAME" >> "$GITHUB_OUTPUT"
          echo "app_resource=$APP_RESOURCE" >> "$GITHUB_OUTPUT"

      - name: Wait for upload operation (REST)
        id: operation
        env:
          OPERATION_NAME: ${{ steps.upload.outputs.operation }}
          GCP_ACCESS_TOKEN: ${{ steps.gcp-auth.outputs.access_token }}
        run: |
          set -euo pipefail
          for i in $(seq 1 60); do
            OPERATION_RESPONSE=$(curl -sS \
              -H "Authorization: Bearer $GCP_ACCESS_TOKEN" \
              "https://firebaseappdistribution.googleapis.com/v1/${OPERATION_NAME}")

            DONE=$(echo "$OPERATION_RESPONSE" | jq -r '.done // false')
            if [ "$DONE" = "true" ]; then
              ERROR_MESSAGE=$(echo "$OPERATION_RESPONSE" | jq -r '.error.message // empty')
              if [ -n "$ERROR_MESSAGE" ]; then
                echo "::error::Upload operation failed: $ERROR_MESSAGE"
                echo "$OPERATION_RESPONSE"
                exit 1
              fi

              RELEASE_NAME=$(echo "$OPERATION_RESPONSE" | jq -r '.response.release.name // .metadata.release.name // empty')
              if [ -z "$RELEASE_NAME" ]; then
                echo "::error::Release name not found in operation response"
                echo "$OPERATION_RESPONSE"
                exit 1
              fi

              echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep 2
          done

          echo "::error::Timed out waiting for upload operation to complete"
          exit 1

      - name: Update release notes (REST)
        if: ${{ inputs.release_notes != '' }}
        env:
          RELEASE_NAME: ${{ steps.operation.outputs.release_name }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
          GCP_ACCESS_TOKEN: ${{ steps.gcp-auth.outputs.access_token }}
        run: |
          set -euo pipefail
          PAYLOAD=$(jq -n --arg notes "$RELEASE_NOTES" '{releaseNotes: {text: $notes}}')

          PATCH_RESPONSE=$(curl -sS -X PATCH \
            -H "Authorization: Bearer $GCP_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://firebaseappdistribution.googleapis.com/v1/${RELEASE_NAME}?updateMask=releaseNotes.text")

          PATCH_ERROR=$(echo "$PATCH_RESPONSE" | jq -r '.error.message // empty')
          if [ -n "$PATCH_ERROR" ]; then
            echo "::error::Failed to update release notes: $PATCH_ERROR"
            echo "$PATCH_RESPONSE"
            exit 1
          fi

      - name: Distribute to Firebase App Distribution
        id: distribute
        env:
          RELEASE_NAME: ${{ steps.operation.outputs.release_name }}
          TESTER_GROUP: ${{ inputs.tester_group }}
          GCP_ACCESS_TOKEN: ${{ steps.gcp-auth.outputs.access_token }}
        run: |
          set -euo pipefail
          PAYLOAD=$(jq -n --arg group "$TESTER_GROUP" '{groupAliases: [$group]}')

          DISTRIBUTE_RESPONSE=$(curl -sS -X POST \
            -H "Authorization: Bearer $GCP_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://firebaseappdistribution.googleapis.com/v1/${RELEASE_NAME}:distribute")

          DISTRIBUTE_ERROR=$(echo "$DISTRIBUTE_RESPONSE" | jq -r '.error.message // empty')
          if [ -n "$DISTRIBUTE_ERROR" ]; then
            echo "::error::Failed to distribute release: $DISTRIBUTE_ERROR"
            echo "$DISTRIBUTE_RESPONSE"
            exit 1
          fi

          echo "Release distributed to group: $TESTER_GROUP"

      - name: Print distribution summary
        if: success()
        env:
          APK_PATH: ${{ steps.apk.outputs.path }}
          RELEASE_NAME: ${{ steps.operation.outputs.release_name }}
        run: |
          set -euo pipefail
          echo "Distribution completed."
          echo "Git ref: ${{ inputs.git_ref }}"
          echo "Workflow impl: rest-v1"
          echo "Head SHA: ${GITHUB_SHA}"
          echo "Workflow ref: ${{ github.workflow_ref }}"
          echo "APK: $APK_PATH"
          echo "Release: $RELEASE_NAME"
          echo "Tester group: ${{ inputs.tester_group }}"
