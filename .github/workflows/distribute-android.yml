name: Distribute Android (Firebase)

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git ref to build (branch/tag/SHA)"
        required: false
        default: "main"
      tester_group:
        description: "Firebase tester group alias"
        required: false
        default: "internal-testers"
      release_notes:
        description: "Release notes shown to testers"
        required: false
        default: ""

permissions:
  contents: read
  id-token: write

jobs:
  distribute:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Validate required secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          FIREBASE_APP_ID_ANDROID: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
        run: |
          set -euo pipefail
          required=(
            ANDROID_KEYSTORE_BASE64
            ANDROID_KEYSTORE_PASSWORD
            ANDROID_KEY_ALIAS
            ANDROID_KEY_PASSWORD
            GCP_WORKLOAD_IDENTITY_PROVIDER
            GCP_SERVICE_ACCOUNT_EMAIL
            FIREBASE_APP_ID_ANDROID
          )
          missing=0
          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing required secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Authenticate to Google Cloud (OIDC)
        id: gcp-auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/cloud-platform

      - name: Restore Android keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          if [ ! -s "$RUNNER_TEMP/release.keystore" ]; then
            echo "::error::Keystore restore failed or file is empty"
            exit 1
          fi

      - name: Build release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew --stacktrace assembleRelease

      - name: Locate release APK
        id: apk
        run: |
          set -euo pipefail
          APK_PATH=$(find app/build/outputs/apk/release -maxdepth 1 -type f -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "::error::No release APK found in app/build/outputs/apk/release"
            exit 1
          fi
          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "Found APK: $APK_PATH"

      - name: Install Firebase CLI
        run: npm install --global firebase-tools

      - name: Distribute to Firebase App Distribution
        id: distribute
        env:
          FIREBASE_APP_ID_ANDROID: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
          TESTER_GROUP: ${{ inputs.tester_group }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
          APK_PATH: ${{ steps.apk.outputs.path }}
        run: |
          set -euo pipefail
          if [ -z "$RELEASE_NOTES" ]; then
            RELEASE_NOTES="CI build from ${GITHUB_SHA}"
          fi

          firebase appdistribution:distribute "$APK_PATH" \
            --app "$FIREBASE_APP_ID_ANDROID" \
            --groups "$TESTER_GROUP" \
            --release-notes "$RELEASE_NOTES" \
            --token "${{ steps.gcp-auth.outputs.access_token }}" | tee "$RUNNER_TEMP/firebase_distribute.log"

      - name: Print distribution summary
        if: success()
        env:
          APK_PATH: ${{ steps.apk.outputs.path }}
        run: |
          set -euo pipefail
          echo "Distribution completed."
          echo "Git ref: ${{ inputs.git_ref }}"
          echo "APK: $APK_PATH"
          echo "Tester group: ${{ inputs.tester_group }}"
